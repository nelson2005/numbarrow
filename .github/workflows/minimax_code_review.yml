name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write

jobs:
  review:
    name: MiniMax Code Review
    runs-on: ubuntu-latest
    steps:
      - name: Code Review
        uses: tarmojussila/minimax-code-review@v0.3.0
        with:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
